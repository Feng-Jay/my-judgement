<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>全部评审</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="./content.generated.js"></script>
    <script src="./reviews-page.js" defer></script>
  </head>
  <body>
    <div id="page-backdrop" class="page-backdrop" aria-hidden="true"></div>

    <main class="page-shell">
      <div class="page-utility">
        <div class="page-utility-group">
          <a id="home-link" class="nav-button" href="./index.html"></a>
        </div>

        <div class="lang-switch" role="group" aria-label="Language switch">
          <button
            id="lang-zh"
            class="lang-button"
            type="button"
            data-lang="zh"
            aria-pressed="true"
          >
            中文
          </button>
          <button
            id="lang-en"
            class="lang-button"
            type="button"
            data-lang="en"
            aria-pressed="false"
          >
            English
          </button>
        </div>
      </div>

      <section class="hero hero--compact">
        <div class="hero-top">
          <p id="reviews-eyebrow" class="eyebrow"></p>
        </div>
        <h1 id="reviews-title"></h1>
        <p id="reviews-description" class="hero-description"></p>
      </section>

      <section id="reviews-app" class="reviews-page"></section>
    </main>
  </body>
</html>
